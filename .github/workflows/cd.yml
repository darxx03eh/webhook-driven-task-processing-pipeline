name: CD - Deploy Stack on EC2

on:
  push:
    branches:
      - main

concurrency:
  group: deploy-main
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: self-hosted
    timeout-minutes: 25

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create runtime env files
        run: |
          printf "%s" "${{ secrets.PROD_DB_ENV }}" > ./shared/db/.env
          printf "%s" "${{ secrets.PROD_BACKEND_ENV }}" > ./backend/.env
          printf "%s" "${{ secrets.PROD_WORKER_ENV }}" > ./worker/.env
          printf "%s" "${{ secrets.PROD_FRONTEND_ENV }}" > ./frontend/.env

      - name: Reclaim Docker disk space
        run: |
          docker system df || true
          docker builder prune -af || true
          docker image prune -af || true
          docker container prune -f || true
          docker system df || true

      - name: Deploy with Docker Compose
        env:
          COMPOSE_BAKE: "false"
        run: |
          docker compose up -d --build --remove-orphans

      - name: Show running services
        run: docker compose ps