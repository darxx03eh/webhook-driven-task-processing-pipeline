name: CD - Deploy Stack on EC2

on:
  push:
    branches:
      - main

concurrency:
  group: deploy-main
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: self-hosted
    timeout-minutes: 25

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create runtime env files
        run: |
          printf "%s" "${{ secrets.PROD_DB_ENV }}" > ./shared/db/.env
          printf "%s" "${{ secrets.PROD_BACKEND_ENV }}" > ./backend/.env
          printf "%s" "${{ secrets.PROD_WORKER_ENV }}" > ./worker/.env
          printf "%s" "${{ secrets.PROD_FRONTEND_ENV }}" > ./frontend/.env

      - name: Stop current stack and remove project images only
        env:
          COMPOSE_BAKE: "false"
        run: |
          docker compose down --remove-orphans --rmi local || true

      - name: Reclaim build cache (safe)
        run: |
          df -h || true
          docker system df || true
          docker builder prune -f || true
          docker image prune -f || true
          docker container prune -f || true
          docker system df || true
          df -h || true

      - name: Build images sequentially to reduce disk pressure
        env:
          COMPOSE_BAKE: "false"
          COMPOSE_PARALLEL_LIMIT: "1"
        run: |
          docker compose build backend
          docker builder prune -f || true
          docker compose build worker
          docker builder prune -f || true
          docker compose build nginx

      - name: Start services
        env:
          COMPOSE_BAKE: "false"
          COMPOSE_PARALLEL_LIMIT: "1"
        run: |
          docker compose up -d --remove-orphans

      - name: Show running services
        run: docker compose ps