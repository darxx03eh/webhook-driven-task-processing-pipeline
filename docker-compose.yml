services:
  postgres:
    image: postgres:17-alpine
    container_name: webhook_postgres
    restart: unless-stopped
    env_file:
      - ./shared/db/.env
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: webhook_backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    command: sh -c "npm run migrate && npm run start"
    env_file:
      - ./backend/.env
    environment:
      NODE_ENV: production
    expose:
      - "3000"

  worker:
    build:
      context: .
      dockerfile: worker/Dockerfile
    container_name: webhook_worker
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    command: npm run start
    env_file:
      - ./worker/.env
    environment:
      NODE_ENV: production

  nginx:
    build:
      context: .
      dockerfile: nginx/Dockerfile
    container_name: webhook_nginx
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  postgres_data:
