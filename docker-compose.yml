version: "3.9"
services:
  postgres:
    image: postgres:17-alpine
    container_name: webhook_postgres
    restart: unless-stopped
    env_file:
      - ./backend/src/db/.env
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
  backend:
    build:
      context: ./backend
    container_name: webhook_backend
    restart: unless-stopped
    depends_on:
      - postgres
    env_file:
      - ./backend/.env
    ports:
      - "3000:3000"   
    volumes:
      - ./backend:/app
      - /app/node_modules
  worker:
    build: 
      context: ./worker
    container_name: webhook_worker
    restart: unless-stopped
    depends_on:
      - postgres
    env_file:
      - ./worker/.env
    volumes:
      - ./worker:/app
      - /app/node_modules
  frontend:
    build:
      context: ./frontend
    container_name: webhook_frontend
    restart: unless-stopped
    depends_on:
      - backend
    env_file:
      - ./frontend/.env
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
volumes:
  postgres_data: