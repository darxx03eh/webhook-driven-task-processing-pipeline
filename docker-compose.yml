version: "3.9"
services:
  postgres:
    image: postgres:17-alpine
    container_name: webhook_postgres
    restart: unless-stopped
    env_file:
      - ./shared/db/.env
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    container_name: webhook_backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    command: sh -c "npm run generate && npm run migrate && npm run dev"
    env_file:
      - ./backend/.env
    environment:
      NODE_PATH: /app/node_modules
    ports:
      - "3000:3000"
    volumes:
      - ./backend:/app
      - ./shared:/shared
      - /app/node_modules

  worker:
    build:
      context: ./worker
    container_name: webhook_worker
    restart: unless-stopped
    depends_on:
      - postgres
    env_file:
      - ./worker/.env
    environment:
      NODE_PATH: /app/node_modules
    volumes:
      - ./worker:/app
      - ./shared:/shared
      - /app/node_modules

  frontend:
    build:
      context: ./frontend
    container_name: webhook_frontend
    restart: unless-stopped
    depends_on:
      - backend
    env_file:
      - ./frontend/.env
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules

  nginx:
    image: nginx:stable-alpine
    container_name: webhook_nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend

volumes:
  postgres_data:
